<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrix AI Ultra</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
html, body {
  min-height: 100vh;
}
body {
  margin: 0;
  overflow: hidden;
}
#loading {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f172a;
  color: white;
  z-index: 9999;
}
.chat-scroll {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.msg-user {
  background: linear-gradient(135deg,#2563eb,#7c3aed);
  color: white;
}
.msg-ai {
  background: #f1f5f9;
}
.dark .msg-ai {
  background: #1e293b;
  color: #e5e7eb;
}
</style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100">

<div id="loading">Loading Spectrix AI...</div>

<div id="app" class="flex min-h-screen hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col fixed md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform z-40">
    <div class="p-3 flex items-center justify-between">
      <span class="font-bold">Spectrix AI</span>
      <button id="closeSidebar" class="md:hidden">✕</button>
    </div>
    <button id="newChatBtn" class="m-2 px-3 py-2 rounded bg-blue-600 text-white">+ New Chat</button>
    <div id="chatList" class="flex-1 overflow-y-auto text-sm"></div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col">

    <!-- Header -->
    <header class="flex items-center gap-2 p-2 border-b border-slate-200 dark:border-slate-700">
      <button id="openSidebar" class="md:hidden px-2">☰</button>
      <div class="flex-1 font-semibold">Chat</div>
      <button id="darkToggle" class="px-2">🌙</button>
      <button id="settingsBtn" class="px-2">⚙️</button>
    </header>

    <!-- Chat -->
    <div id="chatArea" class="flex-1 chat-scroll p-3 space-y-3"></div>

    <!-- Input -->
    <div id="inputBar" class="border-t border-slate-200 dark:border-slate-700 p-2 bg-white dark:bg-slate-800 fixed bottom-0 left-0 right-0 md:relative">
      <div class="flex gap-2">
        <textarea id="userInput" rows="1" class="flex-1 resize-none rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 p-2 text-sm focus:outline-none"></textarea>
        <button id="sendBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Send</button>
        <button id="stopBtn" class="px-3 py-2 bg-red-600 text-white rounded hidden">Stop</button>
      </div>
    </div>

  </main>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white dark:bg-slate-800 p-4 rounded w-96 max-w-full">
    <h2 class="font-bold mb-2">Settings</h2>
    <label class="text-sm">OpenRouter API Key</label>
    <input id="apiKeyInput" type="password" class="w-full p-2 border rounded mb-2 bg-white dark:bg-slate-900">
    <label class="text-sm">Model</label>
    <input id="modelInput" class="w-full p-2 border rounded mb-2 bg-white dark:bg-slate-900" value="deepseek/deepseek-r1:free">
    <label class="text-sm">System Prompt</label>
    <textarea id="systemPromptInput" class="w-full p-2 border rounded bg-white dark:bg-slate-900"></textarea>
    <div class="flex justify-end gap-2 mt-3">
      <button id="closeSettings" class="px-3 py-1 border rounded">Close</button>
      <button id="saveSettings" class="px-3 py-1 bg-blue-600 text-white rounded">Save</button>
    </div>
  </div>
</div>

<script>
/* =====================
   SPECTRIX ULTRA ENGINE
===================== */

const STATE = {
  chats: [],
  currentChatId: null,
  apiKey: localStorage.getItem("spectrix_apiKey") || "",
  model: localStorage.getItem("spectrix_model") || "deepseek/deepseek-r1:free",
  dark: localStorage.getItem("spectrix_dark") === "true",
  systemPrompt: localStorage.getItem("spectrix_systemPrompt") || "You are Spectrix AI Ultra.",
  abortController: null,
  stopRequested: false
};

const DOM = {
  app: document.getElementById("app"),
  loading: document.getElementById("loading"),
  chatArea: document.getElementById("chatArea"),
  chatList: document.getElementById("chatList"),
  input: document.getElementById("userInput"),
  sendBtn: document.getElementById("sendBtn"),
  stopBtn: document.getElementById("stopBtn"),
  sidebar: document.getElementById("sidebar"),
  openSidebar: document.getElementById("openSidebar"),
  closeSidebar: document.getElementById("closeSidebar"),
  darkToggle: document.getElementById("darkToggle"),
  settingsBtn: document.getElementById("settingsBtn"),
  settingsModal: document.getElementById("settingsModal"),
  apiKeyInput: document.getElementById("apiKeyInput"),
  modelInput: document.getElementById("modelInput"),
  systemPromptInput: document.getElementById("systemPromptInput"),
  saveSettings: document.getElementById("saveSettings"),
  closeSettings: document.getElementById("closeSettings"),
  newChatBtn: document.getElementById("newChatBtn")
};

/* ---------- INIT ---------- */
function init() {
  if (STATE.dark) document.documentElement.classList.add("dark");

  loadChats();
  if (!STATE.currentChatId) createNewChat();
  renderChatList();
  renderMessages();

  DOM.apiKeyInput.value = STATE.apiKey;
  DOM.modelInput.value = STATE.model;
  DOM.systemPromptInput.value = STATE.systemPrompt;

  DOM.loading.style.display = "none";
  DOM.app.classList.remove("hidden");
}

function loadChats() {
  const raw = localStorage.getItem("spectrix_chats");
  STATE.chats = raw ? JSON.parse(raw) : [];
  if (STATE.chats.length > 0) {
    STATE.currentChatId = STATE.chats[0].id;
  }
}

function saveChats() {
  localStorage.setItem("spectrix_chats", JSON.stringify(STATE.chats));
}

/* ---------- CHAT MANAGEMENT ---------- */
function createNewChat() {
  const chat = {
    id: Date.now().toString(),
    title: "New Chat",
    messages: [],
    timestamp: Date.now(),
    pinned: false
  };
  STATE.chats.unshift(chat);
  STATE.currentChatId = chat.id;
  saveChats();
}

function getCurrentChat() {
  return STATE.chats.find(c => c.id === STATE.currentChatId);
}

function renderChatList() {
  STATE.chats.sort((a,b)=>{
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return b.timestamp - a.timestamp;
  });

  DOM.chatList.innerHTML = "";
  STATE.chats.forEach(chat=>{
    const div = document.createElement("div");
    div.className = "p-2 cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700 flex justify-between";
    div.innerHTML = `
      <span>${chat.title}</span>
      <span class="text-xs">
        <button onclick="pinChat('${chat.id}')">📌</button>
        <button onclick="deleteChat('${chat.id}')">🗑</button>
      </span>
    `;
    div.onclick = ()=>switchChat(chat.id);
    DOM.chatList.appendChild(div);
  });
}

function switchChat(id) {
  STATE.currentChatId = id;
  renderMessages();
}

function deleteChat(id) {
  STATE.chats = STATE.chats.filter(c=>c.id!==id);
  if (STATE.currentChatId === id) {
    createNewChat();
  }
  saveChats();
  renderChatList();
  renderMessages();
}

function pinChat(id) {
  const chat = STATE.chats.find(c=>c.id===id);
  if (chat) chat.pinned = !chat.pinned;
  saveChats();
  renderChatList();
}

/* ---------- RENDER ---------- */
function renderMessages() {
  const chat = getCurrentChat();
  DOM.chatArea.innerHTML = "";
  chat.messages.forEach(msg=>{
    const div = document.createElement("div");
    div.className = "max-w-[80%] p-2 rounded text-sm whitespace-pre-wrap " + (msg.role==="user"?"msg-user ml-auto":"msg-ai mr-auto");
    div.innerHTML = marked.parse(msg.content);
    DOM.chatArea.appendChild(div);
  });
  highlightAll();
  scrollToBottom();
}

function highlightAll() {
  document.querySelectorAll("pre code").forEach(block=>hljs.highlightElement(block));
}

function scrollToBottom() {
  DOM.chatArea.scrollTop = DOM.chatArea.scrollHeight;
}

/* ---------- SEND MESSAGE ---------- */
async function sendMessage() {
  const text = DOM.input.value.trim();
  if (!text) return;

  const chat = getCurrentChat();
  chat.messages.push({role:"user",content:text});
  DOM.input.value = "";
  renderMessages();

  const aiMsg = {role:"assistant",content:""};
  chat.messages.push(aiMsg);
  renderMessages();

  DOM.sendBtn.classList.add("hidden");
  DOM.stopBtn.classList.remove("hidden");

  STATE.stopRequested = false;
  STATE.abortController = new AbortController();

  const messages = [
    {role:"system",content:STATE.systemPrompt},
    ...chat.messages
  ];

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method:"POST",
      headers:{
        "Authorization":"Bearer "+STATE.apiKey,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        model: STATE.model,
        messages,
        stream:true
      }),
      signal: STATE.abortController.signal
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    let lastRender = 0;

    while(true) {
      const {value,done} = await reader.read();
      if(done || STATE.stopRequested) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");
      for (let line of lines) {
        if(line.startsWith("data: ")) {
          const data = line.slice(6);
          if(data==="[DONE]") break;
          try {
            const json = JSON.parse(data);
            const token = json.choices?.[0]?.delta?.content;
            if(token) {
              fullText += token;
              aiMsg.content = fullText;
              if(Date.now()-lastRender>40) {
                renderMessages();
                lastRender = Date.now();
              }
            }
          } catch {}
        }
      }
    }

  } catch(e) {
    aiMsg.content += "\n\n⚠️ Error: "+e.message;
    renderMessages();
  }

  saveChats();
  DOM.sendBtn.classList.remove("hidden");
  DOM.stopBtn.classList.add("hidden");
}

/* ---------- STOP ---------- */
function stopGeneration() {
  STATE.stopRequested = true;
  if(STATE.abortController) STATE.abortController.abort();
}

/* ---------- UI EVENTS ---------- */
DOM.sendBtn.onclick = sendMessage;
DOM.stopBtn.onclick = stopGeneration;
DOM.newChatBtn.onclick = ()=>{createNewChat();renderChatList();renderMessages();};

DOM.openSidebar.onclick = ()=>DOM.sidebar.classList.remove("-translate-x-full");
DOM.closeSidebar.onclick = ()=>DOM.sidebar.classList.add("-translate-x-full");

DOM.darkToggle.onclick = ()=>{
  STATE.dark = !STATE.dark;
  localStorage.setItem("spectrix_dark", STATE.dark);
  document.documentElement.classList.toggle("dark", STATE.dark);
};

DOM.settingsBtn.onclick = ()=>DOM.settingsModal.classList.remove("hidden");
DOM.closeSettings.onclick = ()=>DOM.settingsModal.classList.add("hidden");

DOM.saveSettings.onclick = ()=>{
  STATE.apiKey = DOM.apiKeyInput.value.trim();
  STATE.model = DOM.modelInput.value.trim();
  STATE.systemPrompt = DOM.systemPromptInput.value;
  localStorage.setItem("spectrix_apiKey", STATE.apiKey);
  localStorage.setItem("spectrix_model", STATE.model);
  localStorage.setItem("spectrix_systemPrompt", STATE.systemPrompt);
  DOM.settingsModal.classList.add("hidden");
};

DOM.input.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

/* ---------- INIT ---------- */
init();
</script>

</body>
</html>
