            darkMode: 'class',

                extend: {
                    colors: {
                        spectrix: {
                            50: '#F0F4F9',
                            100: '#E1E5EA',

    <style>
        html, body {
            height: 100%;
            height: 100dvh;
            overscroll-behavior: none;
            font-family: 'Inter', sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        .prose pre {
            background-color: #1e1e1e !important;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
        .prose code {
            color: #ef4444;
            background-color: rgba(0,0,0,0.05);
            padding: 0.1rem 0.3rem;
            border-radius: 0.2rem;
            font-size: 0.9em;
        }
        .dark .prose code {
            color: #93c5fd;
            background-color: rgba(255,255,255,0.1);
        }
        .prose pre code {
            color: inherit;
            background-color: transparent;
            padding: 0;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>

    <script>
        // IndexedDB Setup
        const DB_NAME = 'Spectrix_DB';
        const DB_VERSION = 1;
        let db = null;

        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('chats')) {
                        const chatStore = database.createObjectStore('chats', { keyPath: 'id' });
                        chatStore.createIndex('timestamp', 'timestamp', { unique: false });
                        chatStore.createIndex('pinned', 'pinned', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('media')) {
                        database.createObjectStore('media', { keyPath: 'id' });
                    }
                };
            });
        }

        async function saveChat(chatData) {
            if (!db) await openDB();
            const tx = db.transaction('chats', 'readwrite');
            const store = tx.objectStore('chats');
            store.put(chatData);
            return new Promise((resolve, reject) => {
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getAllChats() {
            if (!db) await openDB();
            const tx = db.transaction('chats', 'readonly');
            const store = tx.objectStore('chats');
            return new Promise((resolve, reject) => {
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteChatFromDB(id) {
            if (!db) await openDB();
            const tx = db.transaction('chats', 'readwrite');
            const store = tx.objectStore('chats');
            store.delete(id);
            return new Promise((resolve, reject) => {
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // State
        let sessions = {};
        let currentId = null;
        let isGenerating = false;
        let lastUserPrompt = null;

        const els = {
            messagesContainer: document.getElementById('messagesContainer'),
            welcomeState: document.getElementById('welcomeState'),
            promptInput: document.getElementById('promptInput'),
            sendBtn: document.getElementById('sendBtn'),
            chatHistory: document.getElementById('chatHistory'),
            sidebar: document.getElementById('sidebar'),
            headerTitle: document.getElementById('headerTitle'),
            searchBox: document.getElementById('searchBox')
        };

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            await openDB();
            await loadAllSessions();
            initTheme();
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('app').classList.remove('hidden');
            }, 500);

            marked.setOptions({
                highlight: function(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                breaks: true
            });

            els.searchBox.addEventListener('input', renderHistory);
        });

        async function loadAllSessions() {
            const allChats = await getAllChats();
            sessions = {};
            allChats.forEach(chat => {
                sessions[chat.id] = chat;
            });
            
            if (Object.keys(sessions).length === 0) {
                await createNewChat();
            }
            renderHistory();
        }

        async function createNewChat() {
            currentId = Date.now().toString();
            const newSession = {
                id: currentId,
                title: "New Chat",
                messages: [],
                timestamp: Date.now(),
                pinned: false,
                autoTitled: false
            };
            sessions[currentId] = newSession;
            await saveChat(newSession);
            localStorage.setItem('Spectrix_current', currentId);
            renderHistory();
            renderMessages();
            closeSidebarMobile();
        }

        function getCurrentSession() {
            return sessions[currentId] || null;
        }

        function renderHistory() {
            const query = els.searchBox.value.toLowerCase().trim();
            let filtered = Object.values(sessions);
            
            if (query) {
                filtered = filtered.filter(s =>
                    s.title.toLowerCase().includes(query) ||
                    s.messages.some(m => typeof m.content === "string" && m.content.toLowerCase().includes(query))
                );
            }
            
            const sorted = filtered.sort((a, b) => b.timestamp - a.timestamp);
            
            els.chatHistory.innerHTML = sorted.map(chat => `
                <div onclick="selectChat('${chat.id}')" 
                     class="group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${currentId === chat.id ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="ph ph-chat-circle text-lg shrink-0"></i>
                        <span class="text-sm font-medium truncate">${chat.title}</span>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="event.stopPropagation(); renameChat('${chat.id}')" class="p-1 hover:text-blue-500"><i class="ph ph-pencil"></i></button>
                        <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="p-1 hover:text-red-500"><i class="ph ph-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function selectChat(id) {
            currentId = id;
            localStorage.setItem('Spectrix_current', currentId);
            renderMessages();
            closeSidebarMobile();
        }

        async function deleteChat(id) {
            if (!confirm('Delete this chat? 💀')) return;
            await deleteChatFromDB(id);
            delete sessions[id];
            
            if (id === currentId) {
                const remaining = Object.keys(sessions);
                if (remaining.length > 0) {
                    selectChat(remaining[0]);
                } else {
                    await createNewChat();
                }
            }
            renderHistory();
        }

        async function renameChat(id) {
            const chat = sessions[id];
            const newTitle = prompt('Rename chat:', chat.title);
            if (newTitle) {
                chat.title = newTitle;
                await saveChat(chat);
                renderHistory();
                if (id === currentId) {
                    els.headerTitle.textContent = newTitle;
                }
            }
        }

        function renderMessages() {
            const session = getCurrentSession();
            
            if (!session || session.messages.length === 0) {
                els.welcomeState.style.display = 'flex';
                els.messagesContainer.innerHTML = '';
                els.messagesContainer.appendChild(els.welcomeState);
                els.headerTitle.textContent = session?.title || 'Spectrix AI';
                return;
            }

            els.welcomeState.style.display = 'none';
            els.headerTitle.textContent = session.title;
            
            els.messagesContainer.innerHTML = session.messages.map(msg => {
                if (typeof msg.content === 'object' && msg.content.type === 'image') {
                    return `
                        <div class="flex flex-col items-${msg.role === 'user' ? 'end' : 'start'} animate-fade-in">
                            <img src="${msg.content.src}" class="max-w-[85%] md:max-w-[75%] rounded-2xl shadow-lg">
                        </div>
                    `;
                }
                
                return `
                    <div class="flex flex-col items-${msg.role === 'user' ? 'end' : 'start'} animate-fade-in">
                        <div class="max-w-[85%] md:max-w-[75%] rounded-2xl px-5 py-3.5 ${
                            msg.role === 'user' 
                            ? 'bg-gray-100 dark:bg-[#2A2A2A] text-gray-900 dark:text-gray-100 rounded-br-none' 
                            : 'text-gray-800 dark:text-gray-200 prose dark:prose-invert prose-p:my-1 prose-pre:my-2 w-full'
                        }">
                            ${msg.role === 'user' ? escapeHtml(msg.content) : marked.parse(msg.content)}
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('pre code').forEach(hljs.highlightElement);
            scrollToBottom();
        }

        async function sendMessage() {
            let text = els.promptInput.value.trim();
            if (!text || isGenerating) return;

            if (!currentId) await createNewChat();

            isGenerating = true;
            lastUserPrompt = text;
            els.promptInput.value = '';
            els.promptInput.style.height = 'auto';
            els.sendBtn.disabled = true;
            els.sendBtn.innerHTML = '<div class="loader !w-5 !h-5 !border-2"></div>';

            const session = getCurrentSession();
            const isImage = text.startsWith('/img ');
            
            if (isImage) text = text.slice(5);

            session.messages.push({ role: 'user', content: text });
            
            if (session.messages.length === 1) {
                session.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                await saveChat(session);
                renderHistory();
            }

            renderMessages();

            try {
                if (isImage) {
                    const imageModel = document.getElementById('imageModel').value;
                    const res = await fetch("https://hackoai-worker.tariqmtaezeem.workers.dev/hf/img", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            prompt: text, 
                            model: imageModel
                        })
                    });

                    if (!res.ok) throw new Error('Image generation failed');

                    const { url } = await res.json();
                    session.messages.push({ role: 'bot', content: { type: 'image', src: url } });
                    await saveChat(session);
                    renderMessages();
                } else {
                    const model = document.getElementById('textModel').value;
                    const messages = session.messages
                        .filter(m => typeof m.content === 'string')
                        .map(m => ({ role: m.role === 'bot' ? 'assistant' : 'user', content: m.content }));

                    const res = await fetch("https://hackoai-worker.tariqmtaezeem.workers.dev/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ model, messages })
                    });

                    const data = await res.json();
                    const answer = data.choices?.[0]?.message?.content || '💀 Empty response';
                    
                    session.messages.push({ role: 'bot', content: answer });
                    await saveChat(session);
                    renderMessages();
                }
            } catch (err) {
                session.messages.push({ role: 'bot', content: `**Error:** ${err.message}` });
                await saveChat(session);
                renderMessages();
            } finally {
                isGenerating = false;
                els.sendBtn.disabled = false;
                els.sendBtn.innerHTML = '<i class="ph ph-paper-plane-right text-lg"></i>';
            }
        }

        async function exportAll() {
            const data = JSON.stringify(sessions, null, 2);
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Spectrix_backup_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importAll() {
            document.getElementById('importFile').click();
        }

        async function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (confirm('Import chats? This will merge with existing chats.')) {
                        for (const id in imported) {
                            const newId = Date.now().toString() + Math.random();
                            imported[id].id = newId;
                            sessions[newId] = imported[id];
                            await saveChat(imported[id]);
                        }
                        renderHistory();
                        alert('✅ Chats imported!');
                    }
                } catch {
                    alert('❌ Invalid file!');
                }
            };
            reader.readAsText(file);
        }

        // Helpers
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function scrollToBottom() {
            els.messagesContainer.scrollTo({
                top: els.messagesContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function toggleSidebar() {
            const isHidden = els.sidebar.classList.contains('-translate-x-full');
            if (isHidden) {
                els.sidebar.classList.remove('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.remove('hidden');
            } else {
                els.sidebar.classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            }
        }

        function closeSidebarMobile() {
            if (window.innerWidth < 1024) {
                els.sidebar.classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            }
        }

        function initTheme() {
            const dark = localStorage.getItem('theme') === 'dark';
            if (dark) {
                document.documentElement.classList.add('dark');
                document.getElementById('themeText').innerText = 'Light Mode';
                document.getElementById('themeIcon').classList.replace('ph-moon', 'ph-sun');
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeText').innerText = isDark ? 'Light Mode' : 'Dark Mode';
            document.getElementById('themeIcon').classList.toggle('ph-moon');
            document.getElementById('themeIcon').classList.toggle('ph-sun');
        }
    </script>
</body>
</html>
