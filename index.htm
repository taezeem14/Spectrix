<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Critical Mobile Fixes */
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Syntax Highlighting Mockup */
        .code-block {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="flex flex-1 h-full overflow-hidden">
        
        <aside class="w-64 bg-slate-900 border-r border-slate-700 flex flex-col flex-shrink-0 hidden md:flex">
            <div class="p-4 border-b border-slate-700">
                <button onclick="app.newProject()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
                    New Project
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="project-list">
                </div>

            <div class="p-4 border-t border-slate-700">
                <button onclick="app.toggleSettings()" class="w-full flex items-center gap-2 text-slate-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1 1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-slate-800">
            
            <header class="h-14 bg-slate-900 border-b border-slate-700 flex items-center justify-between px-4 flex-shrink-0">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>

                <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <button onclick="app.setView('preview')" id="btn-preview" class="px-3 py-1 rounded text-sm font-medium bg-slate-700 text-white shadow">Preview</button>
                    <button onclick="app.setView('code')" id="btn-code" class="px-3 py-1 rounded text-sm font-medium text-slate-400 hover:text-white">Code</button>
                </div>

                <button onclick="app.downloadCode()" class="text-slate-400 hover:text-blue-400 transition" title="Download index.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
            </header>

            <div class="flex-1 relative w-full overflow-hidden bg-white">
                
                <iframe id="preview-frame" class="w-full h-full border-0 absolute top-0 left-0 z-10 block bg-white"></iframe>
                
                <div id="code-view" class="w-full h-full absolute top-0 left-0 z-0 hidden overflow-auto bg-[#1e1e1e] p-4 text-sm text-green-400 font-mono">
                    <pre><code id="code-content"></code></pre>
                </div>
            </div>

            <footer class="bg-slate-900 border-t border-slate-700 p-4 flex-shrink-0">
                <form onsubmit="app.handleSend(event)" class="max-w-4xl mx-auto relative flex gap-2 items-end">
                    <textarea 
                        id="user-input"
                        class="w-full bg-slate-800 text-white rounded-lg border border-slate-600 p-3 focus:outline-none focus:border-blue-500 resize-none h-14 max-h-32" 
                        placeholder="Describe the website you want to build..."
                    ></textarea>
                    <button type="submit" id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-lg h-14 w-14 flex items-center justify-center transition flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl w-full max-w-md border border-slate-700 shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-white">Settings</h3>
                <button onclick="app.toggleSettings()" class="text-slate-400 hover:text-white">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">API URL (OpenRouter)</label>
                    <input type="text" id="setting-url" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm focus:border-blue-500 outline-none" placeholder="https://openrouter.ai/api/v1/chat/completions">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">API Key</label>
                    <input type="password" id="setting-key" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm focus:border-blue-500 outline-none" placeholder="sk-or-...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Model ID</label>
                    <input type="text" id="setting-model" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm focus:border-blue-500 outline-none" placeholder="deepseek/deepseek-r1:free">
                </div>
            </div>
            <div class="p-4 bg-slate-900 flex justify-end">
                <button onclick="app.saveSettings()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-medium">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = "You are an expert web developer. Output ONLY a single, valid HTML file containing all necessary CSS (in <style>) and JavaScript (in <script>). Do not include markdown backticks. Do not include explanations. The code should be modern, responsive, and ready to run.";

        const DEFAULT_CONFIG = {
            apiUrl: "https://openrouter.ai/api/v1/chat/completions",
            model: "deepseek/deepseek-r1:free",
            apiKey: ""
        };

        const app = {
            state: {
                projects: [],
                currentProjectId: null,
                settings: { ...DEFAULT_CONFIG }
            },

            init() {
                this.loadState();
                this.renderProjects();
                this.updatePreview();
                
                // Initialize Settings inputs
                document.getElementById('setting-url').value = this.state.settings.apiUrl;
                document.getElementById('setting-key').value = this.state.settings.apiKey;
                document.getElementById('setting-model').value = this.state.settings.model;

                // Handle Tab in Textarea
                document.getElementById('user-input').addEventListener('keydown', function(e) {
                    if (e.key == 'Tab') {
                        e.preventDefault();
                        var start = this.selectionStart;
                        var end = this.selectionEnd;
                        this.value = this.value.substring(0, start) + "\t" + this.value.substring(end);
                        this.selectionStart = this.selectionEnd = start + 1;
                    }
                });
            },

            loadState() {
                const saved = localStorage.getItem('ai_builder_state');
                if (saved) {
                    this.state = JSON.parse(saved);
                    // Ensure defaults exist if key missing in old state
                    if (!this.state.settings.apiUrl) this.state.settings.apiUrl = DEFAULT_CONFIG.apiUrl;
                    if (!this.state.settings.model) this.state.settings.model = DEFAULT_CONFIG.model;
                } else {
                    this.newProject(false); // Create initial project
                }
            },

            saveState() {
                localStorage.setItem('ai_builder_state', JSON.stringify(this.state));
            },

            getCurrentProject() {
                return this.state.projects.find(p => p.id === this.state.currentProjectId);
            },

            newProject(render = true) {
                const project = {
                    id: Date.now().toString(),
                    name: `Project ${this.state.projects.length + 1}`,
                    code: '\n<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#333;"><h1>Start by typing a prompt below...</h1></div>',
                    history: [] // Chat history context
                };
                this.state.projects.unshift(project);
                this.state.currentProjectId = project.id;
                this.saveState();
                if (render) {
                    this.renderProjects();
                    this.updatePreview();
                    // Clear input
                    document.getElementById('user-input').value = '';
                }
            },

            switchProject(id) {
                this.state.currentProjectId = id;
                this.saveState();
                this.renderProjects();
                this.updatePreview();
            },

            renderProjects() {
                const list = document.getElementById('project-list');
                list.innerHTML = '';
                this.state.projects.forEach(p => {
                    const btn = document.createElement('button');
                    const isActive = p.id === this.state.currentProjectId;
                    btn.className = `w-full text-left px-3 py-2 rounded text-sm truncate transition ${isActive ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`;
                    btn.textContent = p.name;
                    btn.onclick = () => this.switchProject(p.id);
                    list.appendChild(btn);
                });
            },

            toggleSettings() {
                const modal = document.getElementById('settings-modal');
                modal.classList.toggle('hidden');
            },

            saveSettings() {
                const url = document.getElementById('setting-url').value.trim();
                const key = document.getElementById('setting-key').value.trim();
                const model = document.getElementById('setting-model').value.trim();

                this.state.settings = {
                    apiUrl: url || DEFAULT_CONFIG.apiUrl, // Fallback to ensure not empty
                    apiKey: key,
                    model: model || DEFAULT_CONFIG.model
                };
                
                this.saveState();
                this.toggleSettings();
                alert('Settings saved!');
            },

            setView(view) {
                const previewFrame = document.getElementById('preview-frame');
                const codeView = document.getElementById('code-view');
                const btnPreview = document.getElementById('btn-preview');
                const btnCode = document.getElementById('btn-code');

                if (view === 'preview') {
                    previewFrame.classList.remove('hidden');
                    previewFrame.classList.add('block');
                    codeView.classList.add('hidden');
                    
                    btnPreview.className = "px-3 py-1 rounded text-sm font-medium bg-slate-700 text-white shadow";
                    btnCode.className = "px-3 py-1 rounded text-sm font-medium text-slate-400 hover:text-white";
                } else {
                    previewFrame.classList.add('hidden');
                    previewFrame.classList.remove('block');
                    codeView.classList.remove('hidden');

                    btnCode.className = "px-3 py-1 rounded text-sm font-medium bg-slate-700 text-white shadow";
                    btnPreview.className = "px-3 py-1 rounded text-sm font-medium text-slate-400 hover:text-white";
                }
            },

            updatePreview() {
                const project = this.getCurrentProject();
                if (!project) return;

                // Update Iframe
                const iframe = document.getElementById('preview-frame');
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(project.code);
                doc.close();

                // Update Code View
                const codeContent = document.getElementById('code-content');
                codeContent.textContent = project.code;
            },

            downloadCode() {
                const project = this.getCurrentProject();
                if (!project) return;
                
                const blob = new Blob([project.code], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'index.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            },

            async handleSend(e) {
                e.preventDefault();
                const input = document.getElementById('user-input');
                const prompt = input.value.trim();
                const btn = document.getElementById('send-btn');

                if (!prompt) return;
                if (!this.state.settings.apiKey) {
                    alert('Please set your OpenRouter API Key in Settings first.');
                    this.toggleSettings();
                    return;
                }

                // UI Loading State
                btn.innerHTML = '<div class="loader"></div>';
                btn.disabled = true;
                input.disabled = true;

                const project = this.getCurrentProject();
                
                // Add user message to history
                const messages = [
                    { role: "system", content: SYSTEM_PROMPT },
                    ...project.history,
                    { role: "user", content: `Current Code:\n${project.code}\n\nRequest: ${prompt}` }
                ];

                try {
                    // CRITICAL FIX 1: Enforce Endpoint
                    // CRITICAL FIX 2: Anti-Crash Logic
                    const response = await fetch(this.state.settings.apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${this.state.settings.apiKey}`,
                            "HTTP-Referer": window.location.href, // OpenRouter req
                            "X-Title": "AI Website Builder"
                        },
                        body: JSON.stringify({
                            model: this.state.settings.model,
                            messages: messages
                        })
                    });

                    // 1. Get Text First
                    const rawText = await response.text();

                    // 2. Check Error
                    if (!response.ok) {
                        throw new Error(`API Error ${response.status}: ${rawText}`);
                    }

                    // 3. Parse JSON safely
                    const data = JSON.parse(rawText);
                    
                    if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                        throw new Error("Invalid API Response Format");
                    }

                    const aiContent = data.choices[0].message.content;

                    // Extract Code (Remove markdown backticks if present)
                    let cleanCode = aiContent;
                    const codeBlockRegex = /```html([\s\S]*?)```/i;
                    const match = aiContent.match(codeBlockRegex);
                    if (match) {
                        cleanCode = match[1];
                    } else {
                         // Fallback: try to find start/end of html tags
                         const start = aiContent.indexOf('<!DOCTYPE html>');
                         const end = aiContent.lastIndexOf('</html>');
                         if (start !== -1 && end !== -1) {
                             cleanCode = aiContent.substring(start, end + 7);
                         }
                    }

                    // Update State
                    project.code = cleanCode;
                    project.history.push({ role: "user", content: prompt });
                    project.history.push({ role: "assistant", content: cleanCode }); // Store raw response or code? Store code to keep context clean
                    
                    // Limit history to prevent token overflow (simple sliding window)
                    if (project.history.length > 10) project.history = project.history.slice(-10);

                    this.saveState();
                    this.updatePreview();
                    input.value = '';

                } catch (err) {
                    alert(err.message);
                    console.error(err);
                } finally {
                    // Reset UI
                    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
                    btn.disabled = false;
                    input.disabled = false;
                    input.focus();
                }
            }
        };

        // Start
        app.init();
    </script>
</body>
</html>
